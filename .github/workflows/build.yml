name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.os }}, ${{ matrix.preset }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            preset: ci-release
          - os: ubuntu-22.04
            preset: ci-asan
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          python-version: 3.11
          auto-update-conda: false
          channels: andrsd,main
          channel-priority: strict

      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          conda install \
            cmake \
            make \
            automake \
            cxx-compiler \
            gtest \
            lcov

      - name: Configure
        run: |
          cmake -B build --preset ${{ matrix.preset }} \
            -DGCOV_PATH=`which x86_64-conda-linux-gnu-gcov`

      - name: Build
        run: |
          cmake --build build --preset=${{ matrix.preset }} --parallel 4

      - name: Run tests
        run: |
          ${{ github.workspace }}/build/test/gmshparsercpp-test \
            --gtest_output=xml:${{ github.workspace }}/build/gtest-results.xml

      - name: Test summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: ${{ github.workspace }}/build/gtest-results.xml
          show: "fail, skip"

      - name: Upload test results to codecov.io
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          file: ${{ github.workspace }}/build/gtest-results.xml
          name: ${{ matrix.os }}

      - name: Generate code coverage
        if: startsWith(matrix.os, 'ubuntu')
        run: make -C ${{ github.workspace }}/build coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: startsWith(matrix.os, 'ubuntu')
        with:
          name: coverage-${{ matrix.os }}
          path: ${{ github.workspace }}/build/coverage.info

  upload-to-codecov:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
